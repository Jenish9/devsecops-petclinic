name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
            
      - name: Build project
        run: mvn clean package -DskipTests

  sonar:
    needs: build
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Sonar Scan
        run: mvn sonar:sonar

  snyk:
    needs: sonar
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Snyk Scan
        uses: snyk/actions/maven@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  docker:
    needs: snyk
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springpat .
      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/springpat

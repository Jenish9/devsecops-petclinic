version: "2.2"

services:

  app:
    image: petclinic-app
    build: .
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - postgres

  mysql:
    image: mysql:8.2
    ports:
      - "3306:3306"
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: true
      MYSQL_USER: petclinic
      MYSQL_PASSWORD: petclinic
      MYSQL_DATABASE: petclinic

  postgres:
    image: postgres:16.1
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: petclinic
      POSTGRES_USER: petclinic
      POSTGRES_DB: petclinic